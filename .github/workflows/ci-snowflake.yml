name: CI — lint, compile, test (Snowflake, dbt Fusion)

on:
  pull_request:
    branches: [main]
    paths:
      - 'snowflake/**'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: snowflake

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: snowflake/requirements.txt

      - name: Install pinned Python dependencies
        run: pip install -r requirements.txt

      - name: Install dbt Fusion (pinned to FUSION_VERSION.txt)
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Pin Fusion to the exact version and verify
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          FUSION_VERSION=$(cat FUSION_VERSION.txt)
          dbt system update --version "$FUSION_VERSION"
          python scripts/verify_versions.py

      - name: Run pre-commit checks
        run: pip install pre-commit && pre-commit run --all-files

      - name: Run pytest
        run: pytest tests/ -v

      - name: dbt deps
        working-directory: snowflake/dbt
        run: dbt deps

      - name: dbt compile (syntax check only, no warehouse credits used)
        working-directory: snowflake/dbt
        env:
          SF_ACCOUNT: ${{ secrets.SF_ACCOUNT }}
          SF_USER: ${{ secrets.SF_USER }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
        run: dbt compile --profiles-dir .

      - name: SQLFluff lint
        working-directory: snowflake
        run: |
          sqlfluff lint dbt/models/ \
            --dialect snowflake \
            --templater dbt \
            --format github-annotation
