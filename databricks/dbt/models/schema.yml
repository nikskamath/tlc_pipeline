version: 2

# ── Syntax confirmed for dbt Fusion (2.0.0-preview.190) ─────
# Fusion requires generic test parameters nested under 'arguments:'.

sources:
  - name: silver
    database: tlc
    schema: silver
    description: "Cleaned trip data written by the Silver Spark notebook"
    freshness:
      warn_after: {count: 49, period: hour}
      error_after: {count: 73, period: hour}
    loaded_at_field: _loaded_at
    tables:
      - name: yellow_trips_clean
        description: "Cleaned, typed, zone-joined yellow taxi trips"

models:
  - name: stg_yellow_trips
    description: "Staging pass-through of the Silver layer with renamed columns"
    columns:
      - name: pickup_ts
        data_tests:
          - not_null
      - name: dropoff_ts
        data_tests:
          - not_null
      - name: trip_duration_mins
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 180
              config:
                severity: warn
      - name: fare_amount
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0.5
                max_value: 500
      - name: trip_distance
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
      - name: payment_type
        data_tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6]

  - name: fct_trips
    description: "Core fact table — Gold layer"
    columns:
      - name: pickup_ts
        data_tests:
          - not_null
      - name: fare_amount
        data_tests:
          - not_null
      - name: pickup_borough
        data_tests:
          - not_null

  - name: fct_trips_incremental
    description: "Incremental version of fct_trips — only processes new rows"
    columns:
      - name: pickup_ts
        data_tests:
          - not_null

  - name: agg_daily_revenue
    description: "Daily revenue and trip counts by borough"
    columns:
      - name: trip_date
        data_tests:
          - not_null
      - name: total_revenue
        data_tests:
          - not_null

  - name: agg_hourly_demand
    description: "Trip count by hour of day and borough"

  - name: anomaly_flags
    description: "Z-score based anomaly detection on fare, distance, and duration"
    columns:
      - name: pickup_ts
        data_tests:
          - not_null
      - name: is_anomaly
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
