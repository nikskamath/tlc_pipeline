name: 'tlc_databricks'
version: '1.0.0'
config-version: 2

profile: 'tlc_databricks'

require-dbt-version: [">=2.0.0", "<3.0.0"]

model-paths:    ["models"]
test-paths:     ["tests"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

target-path:    "target"
clean-targets:  ["target", "dbt_packages"]

models:
  tlc_databricks:
    staging:
      +materialized: view
    marts:
      +materialized: table
    ai:
      +materialized: table

vars:
  min_fare:     0.5
  max_fare:     500
  max_distance: 100
