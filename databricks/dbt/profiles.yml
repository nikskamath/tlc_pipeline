tlc_databricks:
  target: dev
  outputs:
    dev:
      type:      databricks
      host:      "{{ env_var('DATABRICKS_HOST') | replace('https://', '') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token:     "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog:   tlc
      schema:    silver
      threads:   4

    prod:
      type:      databricks
      host:      "{{ env_var('DATABRICKS_HOST') | replace('https://', '') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token:     "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog:   tlc
      schema:    silver
      threads:   8
