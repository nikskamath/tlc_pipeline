tlc_snowflake:
  target: dev
  outputs:
    dev:
      type:      snowflake
      account:   "{{ env_var('SF_ACCOUNT') }}"
      user:      "{{ env_var('SF_USER') }}"
      password:  "{{ env_var('SF_PASSWORD') }}"
      role:      SYSADMIN
      database:  TLC_DB
      warehouse: TLC_WH
      schema:    DEV
      threads:   4

    prod:
      type:      snowflake
      account:   "{{ env_var('SF_ACCOUNT') }}"
      user:      "{{ env_var('SF_USER') }}"
      password:  "{{ env_var('SF_PASSWORD') }}"
      role:      SYSADMIN
      database:  TLC_DB
      warehouse: TLC_WH
      schema:    PROD
      threads:   8
